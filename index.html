<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="shortcut icon" href="img/icons/mini-trello.png" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">

    <main>
        <div id="to-do" class="main-section">
            <h2>TO-DO</h2>
            <button onclick="createCard()" class="add-card" id="to-do-btn"> + ADD A CARD </button>
        </div>

        <div id="doing" class="main-section">
            <h2>DOING</h2>
            <button onclick="createCard()" class="add-card"> + ADD A CARD </button>
        </div>

        <div id="done" class="main-section">
            <h2>DONE</h2>
            <button onclick="createCard()" class="add-card"> + ADD A CARD </button>
        </div>
    </main>
